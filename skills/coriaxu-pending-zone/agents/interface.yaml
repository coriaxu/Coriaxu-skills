name: "【Coriaxu】pending-zone"
version: 1.0.0
mode: scaffold
owner: Coriaxu
status: active
updated: 2026-04-27

purpose: |
  通用个人悬置区。保存那些重要但尚未决定是否执行的议题，
  默认写入 $HOME/Desktop/个人悬置区。

inputs:
  - trigger_phrase: 悬置 / 先放一放 / 回头再说 / 看一下悬置区 / 归档
  - context: 当前对话里正在讨论的具体议题

outputs:
  - file: $HOME/Desktop/个人悬置区/YYYY-MM-DD-主题.md
  - updates: 卡片 frontmatter 状态变更
  - archives: $HOME/Desktop/个人悬置区/归档/*.md

non_goals:
  - 不管理纯执行待办
  - 不替代项目任务计划
  - 不保存长期规则或偏好
  - 不做素材库

dependencies:
  - Bash
  - Python 3 optional
  - filesystem read/write

evals:
  - references/boundary.md 的消歧场景
  - references/runbook.md 的冲突处理场景
